name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees: ["Grenish"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start the daemon with `clipboard-manager`
        2. Open the TUI with `Super + V`
        3. Select an entry and press Enter
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Clipboard Manager Version
      description: Run `clipboard-manager --version` or check Cargo.toml
      placeholder: e.g., 0.1.5
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install the clipboard manager?
      options:
        - curl installer (install.sh)
        - AUR (yay / paru)
        - Built from source (cargo build)
        - Other
    validations:
      required: true

  - type: dropdown
    id: display-server
    attributes:
      label: Display Server
      description: Which display server are you using?
      options:
        - Wayland (Hyprland)
        - Wayland (Sway)
        - Wayland (Other)
        - X11
        - Not sure
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux Distribution
      description: Which distro and version are you running?
      placeholder: e.g., Arch Linux, Fedora 40, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: |
        Paste any relevant log output or error messages from the daemon terminal.
        This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help.
    validations:
      required: false
